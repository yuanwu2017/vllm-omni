# Wan2.x Encode/Denoise/Decode disaggregated diffusion pipeline (3 stages).

pipeline: wan2_2_egd
async_chunk: false

trust_remote_code: true
distributed_executor_backend: "mp"

connectors:
  wan_encode_connector:
    name: NixlConnector
    extra:
      backends: [UCX]
      lease_seconds: 300
      transfer_timeout_s: 300
  wan_latent_connector:
    name: NixlConnector
    extra:
      backends: [UCX]
      lease_seconds: 300
      transfer_timeout_s: 300

stages:
  - stage_id: 0
    devices: "0"
    max_num_seqs: 1
    enforce_eager: true
    tensor_parallel_size: 1
    output_connectors:
      to_stage_1: wan_encode_connector
    default_sampling_params:
      seed: 42

  - stage_id: 1
    devices: "1"
    max_num_seqs: 1
    enforce_eager: true
    tensor_parallel_size: 1
    input_connectors:
      from_stage_0: wan_encode_connector
    output_connectors:
      to_stage_2: wan_latent_connector
    default_sampling_params:
      seed: 42

  - stage_id: 2
    devices: "2"
    max_num_seqs: 1
    enforce_eager: true
    tensor_parallel_size: 1
    vae_use_tiling: true
    input_connectors:
      from_stage_1: wan_latent_connector
    default_sampling_params:
      seed: 42
