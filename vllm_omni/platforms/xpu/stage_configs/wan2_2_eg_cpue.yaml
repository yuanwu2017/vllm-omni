# CPU-E + XPU-G variant of wan2_2_eg.yaml.
#
# Stage 0 runs the text encoder on CPU. Stage 1 runs DiT/VAE on the single XPU
# visible inside each headless decode container, so its device ordinal must be 0
# after ZE_AFFINITY_MASK narrows the container to one physical card.

stage_args:
  - stage_id: 0
    stage_type: diffusion
    runtime:
      process: true
      devices: cpu
      max_batch_size: 1
    engine_args:
      stage_role: encode
      model_stage: text_encode
      stage_payload_keys: [prompt_embeds, negative_prompt_embeds]
      model_class_name: WanPipeline
      max_num_seqs: 1
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      engine_output_type: custom
      parallel_config:
        tensor_parallel_size: 1
    output_connectors:
      to_stage_1: wan_encode_connector
    final_output: false

  - stage_id: 1
    stage_type: diffusion
    runtime:
      process: true
      devices: "0"
      max_batch_size: 1
    engine_args:
      stage_role: denoise
      model_stage: dit
      model_class_name: WanPipeline
      max_num_seqs: 1
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      vae_use_tiling: true
      engine_output_type: video
      parallel_config:
        tensor_parallel_size: 1
    engine_input_source: [0]
    input_connectors:
      from_stage_0: wan_encode_connector
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.diffusion_disagg.diffusion_stage_handoff
    final_output: true
    final_output_type: video
    is_comprehension: false
    default_sampling_params:
      seed: 42

runtime:
  enabled: true
  connectors:
    wan_encode_connector:
      name: NixlConnector
      extra:
        backends: [UCX]
        lease_seconds: 300
        transfer_timeout_s: 300
  defaults:
    window_size: -1
    max_inflight: 1
